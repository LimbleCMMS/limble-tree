name: CodeChecks
on: [pull_request]
permissions:
   contents: read
jobs:
   lint:
      runs-on: ubuntu-22.04
      steps:
         - name: Get Codebase
           uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
         - name: Install Node
           uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
           with:
              node-version: "22"
              cache: "npm"
         - name: Install Modules
           run: npm ci
         - name: Run ESLint
           run: npm run lint:check

   format:
      runs-on: ubuntu-22.04
      steps:
         - name: Get Codebase
           uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
         - name: Install Node
           uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
           with:
              node-version: "22"
              cache: "npm"
         - name: Install Modules
           run: npm ci
         - name: Run Prettier Check
           run: npm run format:check

   test:
      runs-on: ubuntu-22.04
      steps:
         - name: Get Codebase
           uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
         - name: Install Node
           uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
           with:
              node-version: "22"
              cache: "npm"
         - name: Install Modules
           run: npm ci
         - name: Build limble-tree
           run: npm run ng build -- limble-tree
         - name: Test limble-tree
           run: npm run ng test -- limble-tree --no-watch --no-progress --browsers=ChromeHeadless
         - name: Test sandbox
           run: npm run ng test -- sandbox --no-watch --no-progress --browsers=ChromeHeadless
